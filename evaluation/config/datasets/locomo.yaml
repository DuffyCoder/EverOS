# LoCoMo Dataset Configuration

name: "locomo"
version: "1.0"
description: "Long-Context Modeling benchmark for conversational memory"

# Memory language setting (overrides MEMORY_LANGUAGE env var)
memory_language: "en"

# Data configuration
data:
  path: "locomo/locomo10.json"  # Relative to evaluation/data/ or project root data/
  format: "locomo"  # Native format, no conversion needed

# Evaluation configuration
evaluation:
  type: "llm_judge"  # llm_judge | exact_match
  
  # LLM Judge settings.
  # NOTE: gpt-4o-mini is NOT supported on sophnet (returns 20004
  # "Model gpt-4o-mini does not support apiType:openai.chat parameter").
  # Stage 1 plugin matrix runs use sophnet for both agent and judge LLM,
  # so judge model must be sophnet-compatible. gpt-4.1-mini works on
  # both sophnet and openrouter.
  llm:
    provider: "openai"
    model: "gpt-4.1-mini"
    api_key: "${LLM_API_KEY}"
    base_url: "${LLM_BASE_URL:https://openrouter.ai/api/v1}"
  
  num_runs: 3  # Number of judging runs per question
  
  # Filter settings
  # LoCoMo categories: "1", "2", "3", "5" (adversarial questions)
  filter_category: [5]  # Can use integers or strings, like [5] or ["5"]

