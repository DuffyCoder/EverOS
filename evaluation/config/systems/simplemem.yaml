# SimpleMem System Configuration (auto-generated by write-eval-adapter skill)
# SimpleMem — local lifelong memory framework with semantic lossless compression
# (aiming-lab/SimpleMem). Text mode uses LanceDB + SQLite under the hood.

name: "simplemem"
version: "1.0"
description: "SimpleMem — local memory framework via simplemem_router factory; LanceDB + SQLite text storage."

adapter: "simplemem"

# SimpleMem-specific configuration
mode: "auto"          # simplemem.create(mode=...) — "auto" picks the appropriate backend
max_retries: 3
request_interval: 0.0

# Concurrency (conversation-level; keep low until smoke test passes)
num_workers: 5

# Search configuration
search:
  top_k: 20

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B
llm:
  provider: "openai"
  model: "openai/gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

# Embedding — SimpleMem reads EMBEDDING_MODEL / OPENAI_BASE_URL from env;
# adapter sets these from the LLM config + env at construction time.
embedding:
  model: "openai/text-embedding-3-small"

answer:
  max_retries: 3
