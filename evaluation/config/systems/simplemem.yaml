# SimpleMem System Configuration (auto-generated by write-eval-adapter skill)

name: "simplemem"
version: "1.0"
description: "SimpleMem — efficient lifelong memory for LLM agents (LanceDB + SQLite, OpenAI-compatible LLM)"

adapter: "simplemem"

# SimpleMem-specific configuration
max_retries: 3
request_interval: 0.0
post_add_wait_seconds: 0.0
search_overfetch: 5
clear_db: true

# Candidate's pip deps (Rule C). Installed EPHEMERALLY via `uv run --with <pkg>`
# at smoke/full time — does NOT touch pyproject.toml or uv.lock.
python_deps:
  # PyPI publishes only 0.1.0 (Jan 2026) — the v0.2.0 add_dialogue/add_text/finalize/query
  # API used by this adapter is on GitHub HEAD, so install from the git tag.
  - "simplemem @ git+https://github.com/aiming-lab/SimpleMem.git@v0.2.0"
  - "lancedb>=0.13"
  - "pyarrow>=15"

# Concurrency (conversation-level; keep low until smoke test passes)
num_workers: 4

# Search configuration
search:
  top_k: 20

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B
llm:
  provider: "openai"
  model: "openai/gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

answer:
  max_retries: 3
