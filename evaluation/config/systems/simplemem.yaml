# SimpleMem System Configuration (auto-generated by write-eval-adapter skill)

name: "simplemem"
version: "1.0"
description: "SimpleMem — semantic-lossless lifelong memory for LLM agents (LanceDB-backed)."

adapter: "simplemem"

# SimpleMem-specific configuration
max_retries: 3
request_interval: 0.0

# Candidate's pip deps installed EPHEMERALLY by the run-bench skill via
# `uv run --with <pkg>`. Does NOT touch pyproject.toml or uv.lock.
# Pinned to >= the first PyPI release (0.1.0) so future patch versions are
# picked up; explicit transitive deps are listed because some are heavy and
# we want uv's resolver to pre-stage the wheels.
python_deps:
  - "simplemem>=0.1.0"
  - "lancedb>=0.4.0"
  - "sentence-transformers>=2.2.0"
  - "tantivy>=0.20.0"
  - "dateparser>=1.1.0"

# Concurrency (conversation-level; conservative for sentence-transformers warmup).
num_workers: 3

# Search configuration
search:
  top_k: 20

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B.
# Sophnet's /v1/models lists "gpt-4.1-mini" (no "openai/" prefix); the env-var
# default LLM_MODEL=openai/gpt-4.1-mini is rejected by this gateway, so we pin
# the bare id here for both answer-generation and SimpleMem's internal calls.
llm:
  provider: "openai"
  model: "gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

answer:
  max_retries: 3
