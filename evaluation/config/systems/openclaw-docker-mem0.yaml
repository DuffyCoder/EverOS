# Stage 1 Week 2 Day 4: openclaw-docker with mem0 plugin slot.
#
# Compared to openclaw-docker.yaml (memory-core baseline):
#   * memory_mode: mem0          (slot owner)
#   * flush_mode:  disabled      (raw transcript ingest; mem0 stores
#                                 raw text + embedding via /sync, no
#                                 LLM-driven flush)
#   * backend_mode: fts_only     (openclaw's memorySearch is disabled
#                                 — mem0 plugin registers its own tools
#                                 that bypass memorySearch entirely;
#                                 fts_only avoids spurious sophnet
#                                 embedding env-var warnings)
#   * image:        mem0-tagged eval image
#
# The bridge auto-detects /sidecar/server.py inside the container and
# routes index/status to sidecar HTTP /sync and /stats instead of the
# (non-existent in mem0 mode) memory-core CLI.
adapter: "openclaw-docker"

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0.0
  max_tokens: 1024

search:
  top_k: 6
  response_top_k: 5
  num_workers: 5
  max_inflight_queries_per_conversation: 1

answer:
  max_retries: 3
  max_concurrent: 4

openclaw:
  repo_path: "${OPENCLAW_REPO_PATH}"
  visibility_mode: "settled"
  retrieval_route: "search_then_get"
  backend_mode: "fts_only"
  flush_mode: "disabled"
  answer_mode: "agent_local"
  memory_mode: "mem0"
  agent_timeout_seconds: 180
  agent_llm:
    provider_id: "sophnet"
    base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
    api: "openai-completions"
    api_key_env: "LLM_API_KEY"
    env_vars:
      - "LLM_API_KEY"
      - "LLM_BASE_URL"
      - "LLM_MODEL"
    model:
      id: "gpt-4.1-mini"
      name: "GPT 4.1 Mini (sophnet)"
      reasoning: false
      input: ["text"]
      cost: {input: 0, output: 0, cacheRead: 0, cacheWrite: 0}
      context_window: 128000
      max_tokens: 4096
  prompts:
    memory_mode: "native_compiled"
    flush_mode: "disabled"
    answer_mode: "shared"

openclaw_docker:
  image: "openclaw-eval:7da23c3-mem0-4ececb3-slim"
  max_concurrent_containers: 4
  mem_limit: "3g"        # mem0 sidecar (chromadb + MiniLM) needs more than memory-core
  network: "bridge"
  per_rpc_timeout_seconds: 240    # mem0 cold-start lazy init can take ~60s
