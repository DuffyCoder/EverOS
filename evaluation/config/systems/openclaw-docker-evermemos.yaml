# Stage 1 Week 3: openclaw-docker with evermemos plugin slot.
#
# Plugin TS fetches host's EverMemOS HTTP API
#   default http://host.docker.internal:1995
# OpenClawDockerAdapter adds --add-host=host.docker.internal:host-gateway
# automatically when memory_mode=evermemos (and forwards EVERMEMOS_API_*
# env to the container).
#
# Prerequisite: host EverMemOS API server must be running. Start it via
# `make run` (from project root) or `uv run python src/run.py`. Verify
# with `curl http://localhost:1995/health` before kicking smoke.
adapter: "openclaw-docker"

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0.0
  max_tokens: 1024

search:
  top_k: 6
  response_top_k: 5
  num_workers: 5
  max_inflight_queries_per_conversation: 1

answer:
  max_retries: 3
  max_concurrent: 4

openclaw:
  repo_path: "${OPENCLAW_REPO_PATH}"
  visibility_mode: "settled"
  retrieval_route: "search_then_get"
  backend_mode: "fts_only"          # plugin tools bypass openclaw memorySearch
  flush_mode: "disabled"            # plugin's sync() POSTs raw session.md to host API
  answer_mode: "agent_local"
  memory_mode: "evermemos"
  agent_timeout_seconds: 180
  agent_llm:
    provider_id: "sophnet"
    base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
    api: "openai-completions"
    api_key_env: "LLM_API_KEY"
    env_vars:
      - "LLM_API_KEY"
      - "LLM_BASE_URL"
      - "LLM_MODEL"
      - "EVERMEMOS_API_URL"
      - "EVERMEMOS_API_KEY"
      - "EVERMEMOS_GROUP_ID"   # per-conv group_id (bridge envForSandbox whitelist)
      - "OPENCLAW_PROMPT_STYLE" # Track B ablation: native | memory-core | mem0
    model:
      id: "gpt-4.1-mini"
      name: "GPT 4.1 Mini (sophnet)"
      reasoning: false
      input: ["text"]
      cost: {input: 0, output: 0, cacheRead: 0, cacheWrite: 0}
      context_window: 128000
      max_tokens: 4096
  prompts:
    memory_mode: "native_compiled"
    flush_mode: "disabled"
    answer_mode: "shared"

openclaw_docker:
  image: "openclaw-eval:7da23c3-evermemos-66f8292-slim"
  max_concurrent_containers: 4
  mem_limit: "2g"        # no Python sidecar, lighter than mem0
  network: "bridge"
  per_rpc_timeout_seconds: 210
  add_host_gateway: true # explicit (auto-defaulted for evermemos but kept for clarity)
