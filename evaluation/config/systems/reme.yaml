# ReMe System Configuration (auto-generated by write-eval-adapter skill)

name: "reme"
version: "1.0"
description: "ReMe (Remember Me, Refine Me) — local vector-store memory framework"

adapter: "reme"

# Concurrency (conversation-level; keep low until smoke test passes)
num_workers: 2

# Search configuration
search:
  top_k: 20

# ReMe-specific configuration
reme:
  algo_version: "default"
  enable_thinking_params: false
  retrieve_top_k: 20
  summarize_batch_size: 40
  vector_store_backend: "local"
  llm_backend: "openai"
  # sophnet_embeddings is registered inside the adapter: Sophnet's native
  # /embeddings endpoint uses {easyllm_id, model, input_texts, dimensions}
  # which is NOT OpenAI-compatible, so the stock openai backend 404s.
  embedding_backend: "sophnet_embeddings"
  enable_profile: false
  log_to_console: true
  raise_exception: true

# Candidate's pip deps (Rule C). Installed EPHEMERALLY via `uv run --with <pkg>`
# at smoke/full time — does NOT touch pyproject.toml or uv.lock.
python_deps:
  - "reme-ai>=0.3.1"
  - "agentscope==1.0.18"
  - "sqlite-vec>=0.1.6"
  - "chromadb>=1.3.5"

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B
llm:
  provider: "openai"
  model: "openai/gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

# Embedding configuration — routine's VECTORIZE_* env vars become ReMe's
# EMBEDDING_API_KEY / EMBEDDING_BASE_URL (the adapter does the rewrite).
embedding:
  api_key: "${VECTORIZE_API_KEY}"
  base_url: "${VECTORIZE_BASE_URL}"
  model: "${VECTORIZE_MODEL:text-embedding-v4}"

answer:
  max_retries: 3
