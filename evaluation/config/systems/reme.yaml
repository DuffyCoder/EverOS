# ReMe System Configuration (auto-generated by write-eval-adapter skill)

name: "reme"
version: "1.0"
description: "ReMe — local personal memory via reme_ai flow pipeline (agentscope-ai/ReMe)"

adapter: "reme"

# ReMe-specific configuration
vector_store_backend: "memory"     # in-process vector store, no external services
working_dir: ".reme_eval"
embedding_model: "text-embedding-3-small"

max_retries: 3
request_interval: 0.0

# Candidate's pip deps (Rule C). Installed EPHEMERALLY via `uv run --with <pkg>`
# at smoke/full time — does NOT touch pyproject.toml or uv.lock.
python_deps:
  - "reme-ai>=0.3.1"
  - "flowllm[reme]>=0.2.0.10"
  - "agentscope==1.0.18"

# Concurrency (conversation-level; keep low until smoke test passes)
num_workers: 3

# Search configuration
search:
  top_k: 20

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B
llm:
  provider: "openai"
  model: "${LLM_MODEL:gpt-4.1-mini}"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

answer:
  max_retries: 3
