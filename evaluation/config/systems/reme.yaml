# ReMe System Configuration (auto-generated by write-eval-adapter skill)
# ReMe — file-and-vector memory kit for AI agents (agentscope-ai/ReMe).

name: "reme"
version: "1.0"
description: "ReMe — local memory management kit with file + vector backends, native LLM_API_KEY/LLM_BASE_URL env support."

adapter: "reme"

# ReMe-specific configuration (vector-backed mode)
working_dir: ".reme"
max_retries: 3
request_interval: 0.0

# Concurrency (conversation-level; keep low until smoke test passes)
num_workers: 5

# Search configuration
search:
  top_k: 20

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B
llm:
  provider: "openai"
  model: "openai/gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

# Embedding — defaults to the same Sophnet endpoint via env if not overridden by the harness.
# If Sophnet does not expose embeddings, override via EMBEDDING_BASE_URL / EMBEDDING_API_KEY env vars.
embedding:
  model: "openai/text-embedding-3-small"
  dimensions: 1536

vector_store:
  backend: "local"

answer:
  max_retries: 3
