# Stage 1 Week 1 Day 3: openclaw-docker (Path B via dockerized openclaw)
# Mirrors openclaw-agent-local.yaml but routes bridge through docker exec.
adapter: "openclaw-docker"

llm:                              # judge / evermemos-internal LLM
  provider: "openai"
  model: "gpt-4o-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0.0
  max_tokens: 1024

search:
  top_k: 6
  response_top_k: 5
  num_workers: 5
  max_inflight_queries_per_conversation: 1

answer:
  max_retries: 3
  max_concurrent: 4   # sophnet rate-limit safe (Stage 0 D5)

openclaw:
  repo_path: "${OPENCLAW_REPO_PATH}"
  visibility_mode: "settled"
  retrieval_route: "search_then_get"
  backend_mode: "hybrid"
  flush_mode: "shared_llm"
  answer_mode: "agent_local"
  memory_mode: "noop"
  agent_timeout_seconds: 180
  agent_llm:
    provider_id: "sophnet"
    base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
    api: "openai-completions"
    api_key_env: "LLM_API_KEY"
    env_vars:
      - "LLM_API_KEY"
      - "LLM_BASE_URL"
      - "LLM_MODEL"
      - "SOPH_API_KEY"
      - "SOPH_EMBED_URL"
      - "SOPH_EMBED_EASYLLM_ID"
    model:
      id: "gpt-4.1-mini"
      name: "GPT 4.1 Mini (sophnet)"
      reasoning: false
      input: ["text"]
      cost: {input: 0, output: 0, cacheRead: 0, cacheWrite: 0}
      context_window: 128000
      max_tokens: 4096
  embedding:
    provider: "${OPENCLAW_EMBED_PROVIDER:sophnet}"
    model: "${OPENCLAW_EMBED_MODEL:text-embeddings}"
    api_key_env: "SOPH_API_KEY"
    base_url: "${SOPH_EMBED_URL:https://www.sophnet.com/api/open-apis/projects/6RT1wCDeN59dVd1L10UMRz/easyllms/embeddings}"
    easyllm_id: "${SOPH_EMBED_EASYLLM_ID:1aKhWpzR3QKay9sZZ1TqWi}"
    output_dimensionality: 1024
  prompts:
    memory_mode: "native_compiled"
    flush_mode: "shared_llm"
    answer_mode: "shared"

# v0.7 Stage 1: docker-specific config
openclaw_docker:
  image: "openclaw-eval:7da23c3-memory-core-0000000-slim"
  max_concurrent_containers: 4
  mem_limit: "2g"
  network: "bridge"
  per_rpc_timeout_seconds: 210
