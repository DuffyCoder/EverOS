# A-MEM (Agentic Memory) system configuration.
# Repo: https://github.com/agiresearch/A-mem
# Paper: arXiv 2502.12110 (NeurIPS 2025).
#
# Routine classification (CLAUDE.md / auto-bench-routine):
# - tier: local-with-cloud-llm
# - memory_backend: local (ChromaDB EphemeralClient, in-process)
# - LLM: rewritten to Sophnet baseline via OPENAI_BASE_URL / OPENAI_API_KEY
# - Embedding: A-MEM default `all-MiniLM-L6-v2` (~22M params, < 1B threshold)

name: "amem"
version: "0.0.1"
description: "A-MEM: Agentic Memory for LLM Agents (NeurIPS 2025)"

adapter: "amem"

# Ephemeral pip overlay used by the run-bench skill (`uv run --with`).
# Keeps pyproject.toml / uv.lock untouched per Rule C.
python_deps:
  - "agentic-memory @ git+https://github.com/agiresearch/A-mem.git"

# A-MEM-specific knobs.
amem:
  embedding_model: "all-MiniLM-L6-v2"
  llm_backend: "openai"
  llm_model: "gpt-4o-mini"  # Sophnet-accepted id (verified via LLM-judge stage)
  evo_threshold: 100
  max_content_length: 12000

# Conversation-level concurrency. A-MEM is CPU-bound during analyze/evolve and
# the OpenAI client serializes per-instance, so we keep this conservative.
num_workers: 4

# A-MEM operations are synchronous, no background indexer to wait on.
post_add_wait_seconds: 0

# LLM configuration — used by OnlineAPIAdapter for the answer stage and
# referenced by the adapter to redirect A-MEM's internal OpenAI client
# (OPENAI_BASE_URL / OPENAI_API_KEY).
llm:
  provider: "openai"
  model: "${LLM_MODEL:gpt-4o-mini}"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 16384

search:
  top_k: 10

answer:
  max_retries: 3
