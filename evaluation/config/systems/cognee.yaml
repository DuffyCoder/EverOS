# Cognee System Configuration (auto-generated by write-eval-adapter skill)
# Cognee — knowledge-engine memory: knowledge graph + vector index over ingested text.

name: "cognee"
version: "1.0"
description: "Cognee — async SDK with cognee.add / cognee.cognify / cognee.search; per-user isolation via dataset_name."

adapter: "cognee"

# Cognee uses NetworkX in-process by default (no Neo4j needed for the routine's RAM budget).
# To switch to Neo4j or Postgres, set GRAPH_DATABASE_PROVIDER / DB_PROVIDER env vars.
search_type: "GRAPH_COMPLETION"
max_retries: 3
request_interval: 0.0

# Concurrency (conversation-level)
num_workers: 5

# Search configuration
search:
  top_k: 20

# LLM configuration — FORCED to fairness-baseline provider (Sophnet) per Rule B
llm:
  provider: "openai"
  model: "openai/gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://www.sophnet.com/api/open-apis/v1}"
  temperature: 0
  max_tokens: 32768

answer:
  max_retries: 3
